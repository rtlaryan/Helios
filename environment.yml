name: helios
channels:
  - pytorch        # provides pytorch with CPU/CUDA/MPS variants
  - conda-forge
  - defaults

dependencies:
  - python>=3.12

  # ── Core ML / numerics ──────────────────────────────────────────
  # pytorch/torchvision/torchaudio: conda picks the right CUDA/MPS
  # build automatically for the target platform.
  - numpy
  - pyyaml

  # ── Plotting ────────────────────────────────────────────────────
  - matplotlib

  # ── Web server (UI backend) ──────────────────────────────────────
  - flask
  - flask-cors

  # ── Notebook support ────────────────────────────────────────────
  - jupyter
  - ipykernel
  - ipympl

  # ── Dev tooling ─────────────────────────────────────────────────
  - pytest
  - pre-commit
  - pip
  - pip:
    - ruff             # not yet on conda-forge stable; pip is fine
    - torch
    - torchaudio
    - torchvision

prefix: /Users/aryan/miniconda3/envs/helios
