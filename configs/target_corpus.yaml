count: 200000
seed: 7
workers: auto

output:
  root: data/targets/simple
  manifestPath: data/targets/simple/manifest.yaml
  prefix: target

grid:
  latRange: [0.0, 40.0]
  lonRange: [-80.0, 120.0]
  resolutionDeg: 0.5
  decimate: 1
  powerMode: normalized

curriculum:
  weights:
    single_circle: 1.0
    irregular_shape: 0.0
    multibeam: 0.0

categories:
  single_circle:
    radiusRange: [2.5, 15]
    rolloffRange: [1, 3]
    peakDBRange: [-3.0, 0.0]

  irregular_shape:
    componentCountRange: [2, 4]
    circleComponentProbability: 0.5
    radiusRange: [0.75, 5.0]
    polygonRadiusRange: [1.0, 3.0]
    polygonVertexCountRange: [3, 6]
    componentJitterRange: [0.5, 3.5]
    rolloffRange: [0.3, 1.2]
    peakDBRange: [-6.0, 0.0]

  multibeam:
    beamCountRange: [2, 4]
    radiusRange: [2.5, 10]
    rolloffRange: [0.3, 1.2]
    peakDBRange: [-3.0, 0.0]
    minSeparationDeg: 1
    placementAttempts: 64
