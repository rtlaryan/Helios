experiment:
  name: evo_3_multibeam
  logDir: data/runs
  archiveDir: data/archive
  resume: false
  plotProjection: false
  tensorboard: true
  targetMode: auto

device:
  device: cuda
  dtype: float32

array:
  centerFrequency: 30.0e9
  elementSpacingRatio: 0.5
  positionJitterSTD: 0.0
  phaseJitterSTD: 0.0
  failRate: 0.0
  allowedElementCount: [25000]
  allowedAspectRatio: [1.0]
  geometry: URA
  gainRange: [1.0, 1.0]
  sparsityRange: [1.0, 1.0]
  latitudeRange: [15.0, 15.0]
  longitudeRange: [-83.0, -83.0]
  altitudeRange: [6.0e6, 6.0e6]

evolution:
  generator: null
  batchSize: 50
  evolutionSteps: 20000
  initialWeightsType: random
  cloneFraction: 0.15
  crossoverFraction: 0.15
  mutateFraction: 0.55
  randomFraction: 0.15
  parentPoolFraction: 0.15
  phaseSigma: 0.2
  amplitudeSigma: 0.01
  gainSigma: 0
  phaseSigmaDecay: 0.9998
  amplitudeSigmaDecay: 0.9995
  randomFractionDecay: 0.999
  phaseMinSigma: 5e-4
  amplitudeMinSigma: 5e-5
  minRandomFraction: 0.02
  stagnationWindow: 250
  sigmaBoostDuration: 25
  sigmaBoostMultiplier: 2.0
  sigmaBoostRandomFraction: 0.15
  phaseAdaptiveSigmaFloor: false
  phaseMinSigmaScale: 0.1
  amplitudeMinSigmaScale: 0.1
  wideGridSizeStart: 128
  wideGridRampSteps: 4000
  linearResponseChunkSize: 400000
  wideResponseChunkSize: 400000
  responseReductionTileCap: 2000
  lossType: HUBER

loss:
  w_shape: 1.0
  w_eff: 0.1
  w_wide: 15
  wide_grid_size: 128
  wide_support_dilation_cells: 1

logging:
  logMode: metrics_only
  datasetFlushEverySteps: 10
  responseCompactSize: 64

checkpoint:
  checkpointMode: periodic
  checkpointEverySteps: 100

workers:
  asyncIO: true
  datasetWriterWorkers: 2
  checkpointWriterWorkers: 2
  ioQueueSize: 4

target:
  reference: target_spec.pt
  references: null
  inline: null
  inlineBatch: null
  format: null
  resolutionDeg: 0.01
  decimate: 6
